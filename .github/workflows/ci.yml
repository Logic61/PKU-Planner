name: CI
on:
  push:
    branches: [ main, master, '**' ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: windows-2022
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 激活 MSVC 环境（这个保留，为了 nmake 和 cl.exe）
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 2. 关键：安装 Qt 6.6.0（你可以改成你喜欢的版本，如 6.6.3）
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'          # 关键：使用正确的完整架构名
          modules: 'qtcharts'                 # 只写需要的额外模块，不要写 qt_base 和 qtquickcontrols2
          dir: 'D:/a/PKU-Planner-Vibe-Version/Qt'

      # 3. 运行你的编译脚本
      - name: Build and run unit tests
        run: |
          .\run_build.bat
        shell: cmd

      - name: Smoke test
        # 记得在 smoke_test.bat 里加上 set QT_QPA_PLATFORM=offscreen
        run: |
          .\smoke_test.bat
        shell: cmd

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: PKUPlanner-exe
          path: build\PKUPlanner.exe