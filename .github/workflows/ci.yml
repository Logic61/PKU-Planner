name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: cmd
        run: cmake -S . -B build -G "MinGW Makefiles"

      - name: Build
        shell: cmd
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PKUPlanner-${{ github.sha }}
          path: build/PKUPlanner.exe
