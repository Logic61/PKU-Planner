name: CI-Lite

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  test-core:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run core tests
        run: |
          python -m unittest discover tests