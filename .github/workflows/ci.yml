name: CI
on:
  push:
    branches: [ main, master, '**' ]
  pull_request:
    branches: [ main, master ]

# 解决 Node.js 24 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    # 明确指定版本以避免迁移期的重定向警告
    runs-on: windows-2022 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 使用新的环境变量语法设置路径 (GITHUB_PATH)
      - name: Set up Environment Path
        run: |
          echo "C:\Qt\6.6\msvc2022_64\bin" >> $env:GITHUB_PATH
          echo "C:\Program Files\CMake\bin" >> $env:GITHUB_PATH
        shell: powershell

      - name: Build and run unit tests
        run: |
          .\run_build.bat
        shell: cmd

      - name: Smoke test
        run: |
          .\smoke_test.bat
        shell: cmd

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: PKUPlanner-exe
          path: build\PKUPlanner.exe